<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summa Brevis | A Essência da Literatura Católica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
      // Restore path encoded by 404.html redirect
      (function () {
        var params = window.location.search.slice(1).split('&').reduce(function (acc, cur) {
          var eq = cur.indexOf('=');
          if (eq > 0) acc[cur.slice(0, eq)] = decodeURIComponent(cur.slice(eq + 1));
          return acc;
        }, {});
        if (params.p) {
          var base = window.location.pathname.replace(/\/$/, '');
          history.replaceState(null, null, base + params.p + (params.hash || ''));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
