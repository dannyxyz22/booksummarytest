[[redirects]]
from = "https://summa-brevis.netlify.app/*"
to = "https://summa.legatuschristi.org/:splat"
status = 301
force = true

[build]
  base = "webapp"
  command = "npm run build"
  publish = "dist"
  # Ensures Netlify builds when files in webapp, summaries, or books change
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF . ../summaries/ ../books/"
