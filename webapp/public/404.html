<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Summa Brevis</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages returns a 404 for a deep path, this page captures the
      // intended URL, encodes the path as a query param, and redirects back to
      // the root index.html which restores it via history.replaceState.
      (function () {
        var l = window.location;
        // Keep only the first path segment (/booksummarytest) as the base
        var base = '/' + l.pathname.split('/')[1];
        var subPath = l.pathname.slice(base.length) + l.search;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          base + '/?p=' + encodeURIComponent(subPath) +
          (l.hash ? '&hash=' + encodeURIComponent(l.hash) : '')
        );
      })();
    </script>
  </head>
  <body></body>
</html>
